name: CI ✅

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend checks 🔧
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

  front:
    name: Front checks 🎨
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: front/package-lock.json

      - run: npm ci

      - name: Type-check
        run: npm run check

      - name: Build
        run: npm run build
